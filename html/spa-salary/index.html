<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工薪资结算系统 - 增强版</title>
    <!-- 引入 Tailwind CSS CDN 以保证美观设计 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .print-only { display: none; }
        @media print {
            .no-print { display: none; }
            .print-only { display: block; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto space-y-8">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 no-print">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">员工薪资结算系统</h1>
            <p class="text-slate-500">自定义规则、业绩导入与自动化核算</p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleSection('json-area')" class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition font-semibold flex items-center gap-2">
                <span>📁 JSON 导入/导出</span>
            </button>
            <button onclick="calculateAll()" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition font-semibold flex items-center gap-2">
                <span>💰 开始核算</span>
            </button>
        </div>
    </div>

    <!-- JSON 交互区 (默认隐藏) -->
    <div id="json-area" class="hidden glass-card p-6 border border-slate-200 rounded-2xl shadow-sm no-print">
        <h3 class="text-lg font-bold mb-3 text-slate-700">数据入口 (JSON)</h3>
        <textarea id="jsonInput" class="w-full h-48 p-4 font-mono text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="在此粘贴数据..."></textarea>
        <div class="mt-4 flex justify-end gap-2">
            <button onclick="exportData()" class="px-3 py-1 text-slate-600 hover:bg-slate-50 rounded">导出当前数据</button>
            <button onclick="importData()" class="px-4 py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600">确认导入数据</button>
        </div>
    </div>

    <!-- 规则管理区域 -->
    <div class="glass-card p-6 border border-slate-200 rounded-2xl shadow-sm no-print">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold text-slate-700 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                自定义核算规则菜单
            </h3>
        </div>
        <div id="rules-container" class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- 规则项 -->
        </div>
    </div>

    <!-- 员工数据输入 -->
    <div class="glass-card overflow-hidden border border-slate-200 rounded-2xl shadow-sm no-print">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                    <th class="px-6 py-4 text-sm font-semibold text-slate-600">员工姓名</th>
                    <th class="px-6 py-4 text-sm font-semibold text-slate-600">核算规则</th>
                    <th class="px-6 py-4 text-sm font-semibold text-slate-600">本月业绩</th>
                    <th class="px-6 py-4 text-sm font-semibold text-slate-600">上月业绩</th>
                    <th class="px-6 py-4 text-sm font-semibold text-slate-600">小费(Tips)</th>
                </tr>
            </thead>
            <tbody id="employee-rows">
                <!-- 员工行 -->
            </tbody>
        </table>
    </div>

    <!-- 结算结果 -->
    <div id="payroll-results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- 计算结果卡片 -->
    </div>
</div>

<script>
    // 1. 系统预设规则
    let rules = [
        { id: 'rule_1', name: '底薪 + 20% 提成', base: 2500, rate: 20 },
        { id: 'rule_2', name: '纯 35% 提成', base: 0, rate: 35 },
        { id: 'rule_3', name: 'Vic 专用 (25%)', base: 0, rate: 25 }
    ];

    // 2. 初始员工数据
    let employees = [
        { name: "Nana", ruleId: "rule_2", current: 49950, last: 9740, tips: 1920 },
        { name: "Vic", ruleId: "rule_3", current: 36940, last: 6930, tips: 790 },
        { name: "Sindy", ruleId: "rule_1", current: 42250, last: 4700, tips: 1830 },
        { name: "Zee", ruleId: "rule_1", current: 33100, last: 6230, tips: 1305 },
        { name: "Ver", ruleId: "rule_1", current: 38250, last: 8080, tips: 1565 },
        { name: "Fay", ruleId: "rule_1", current: 33010, last: 10380, tips: 610 },
        { name: "Sal", ruleId: "rule_1", current: 33560, last: 6290, tips: 1110 },
        { name: "Nas", ruleId: "rule_1", current: 42390, last: 8600, tips: 1780 },
        { name: "Sona", ruleId: "rule_2", current: 36990, last: 6700, tips: 1150 },
        { name: "Yao", ruleId: "rule_2", current: 46660, last: 6120, tips: 3360 }
    ];

    // 初始化渲染
    window.onload = () => {
        renderRules();
        renderEmployees();
        exportData(); // 预填JSON框
    };

    function toggleSection(id) {
        document.getElementById(id).classList.toggle('hidden');
    }

    // 渲染规则管理区
    function renderRules() {
        const container = document.getElementById('rules-container');
        container.innerHTML = rules.map((r, idx) => `
            <div class="p-4 border border-indigo-100 rounded-xl bg-indigo-50/30 relative group">
                <button onclick="deleteRule(${idx})" class="absolute top-2 right-2 text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity p-1" title="删除规则">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
                <input type="text" value="${r.name}" onchange="updateRule(${idx}, 'name', this.value)" class="bg-transparent font-bold text-indigo-900 w-full mb-2 outline-none pr-6">
                <div class="flex gap-2 text-sm">
                    <div class="flex-1">
                        <label class="block text-slate-400 text-xs uppercase">底薪</label>
                        <input type="number" value="${r.base}" onchange="updateRule(${idx}, 'base', this.value)" class="w-full bg-white border rounded p-1">
                    </div>
                    <div class="flex-1">
                        <label class="block text-slate-400 text-xs uppercase">提成%</label>
                        <input type="number" value="${r.rate}" onchange="updateRule(${idx}, 'rate', this.value)" class="w-full bg-white border rounded p-1">
                    </div>
                </div>
            </div>
        `).join('') + `
            <button onclick="addRule()" class="p-4 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 hover:border-indigo-300 hover:text-indigo-500 transition flex flex-col items-center justify-center min-h-[100px]">
                <span>+ 添加新规则</span>
            </button>
        `;
        renderEmployees(); // 规则变了，下拉菜单也要重绘
    }

    function addRule() {
        rules.push({ id: 'rule_' + Date.now(), name: '新规则', base: 0, rate: 0 });
        renderRules();
    }

    function deleteRule(idx) {
        const ruleId = rules[idx].id;
        // 检查是否有员工正在使用此规则
        const inUse = employees.some(emp => emp.ruleId === ruleId);
        
        if (inUse) {
            alert(`无法删除！目前有员工正在使用“${rules[idx].name}”规则。请先在员工列表中为他们更改规则。`);
            return;
        }

        if (rules.length <= 1) {
            alert("至少需要保留一个核算规则。");
            return;
        }

        if (confirm(`确定要删除规则“${rules[idx].name}”吗？`)) {
            rules.splice(idx, 1);
            renderRules();
            exportData();
        }
    }

    function updateRule(idx, field, val) {
        rules[idx][field] = field === 'name' ? val : parseFloat(val) || 0;
        renderRules();
        exportData();
    }

    // 渲染员工行
    function renderEmployees() {
        const container = document.getElementById('employee-rows');
        container.innerHTML = employees.map((emp, idx) => {
            const ruleOptions = rules.map(r => `<option value="${r.id}" ${emp.ruleId === r.id ? 'selected' : ''}>${r.name}</option>`).join('');
            return `
                <tr class="hover:bg-slate-50 border-b border-slate-100 transition text-sm">
                    <td class="px-6 py-4 font-bold text-slate-700">${emp.name}</td>
                    <td class="px-6 py-4">
                        <select onchange="updateEmployee(${idx}, 'ruleId', this.value)" class="bg-white border border-slate-200 rounded p-1 outline-none focus:ring-1 focus:ring-indigo-500 max-w-[150px]">
                            ${ruleOptions}
                        </select>
                    </td>
                    <td class="px-6 py-4"><input type="number" value="${emp.current}" onchange="updateEmployee(${idx}, 'current', this.value)" class="w-24 border rounded p-1"></td>
                    <td class="px-6 py-4"><input type="number" value="${emp.last}" onchange="updateEmployee(${idx}, 'last', this.value)" class="w-24 border rounded p-1"></td>
                    <td class="px-6 py-4"><input type="number" value="${emp.tips}" onchange="updateEmployee(${idx}, 'tips', this.value)" class="w-24 border rounded p-1"></td>
                </tr>
            `;
        }).join('');
    }

    function updateEmployee(idx, field, val) {
        employees[idx][field] = (field === 'ruleId' || field === 'name') ? val : parseFloat(val) || 0;
        exportData();
    }

    // 导出/导入 JSON
    function exportData() {
        const data = { rules, employees };
        document.getElementById('jsonInput').value = JSON.stringify(data, null, 2);
    }

    function importData() {
        try {
            const data = JSON.parse(document.getElementById('jsonInput').value);
            if (data.rules) rules = data.rules;
            if (data.employees) employees = data.employees;
            renderRules();
            renderEmployees();
            alert("数据同步完成！");
        } catch(e) {
            alert("无效的 JSON 格式！");
        }
    }

    // 计算薪资
    function calculateAll() {
        const container = document.getElementById('payroll-results');
        container.innerHTML = '';

        employees.forEach(emp => {
            const rule = rules.find(r => r.id === emp.ruleId) || rules[0];
            const perfTotal = emp.current + emp.last;
            const commission = perfTotal * (rule.rate / 100);
            const basicWage = rule.base + commission;
            const finalPay = basicWage + emp.tips;

            const card = document.createElement('div');
            card.className = "bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition relative overflow-hidden";
            card.innerHTML = `
                <div class="absolute top-0 right-0 p-2 opacity-10">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h4 class="text-xl font-bold text-slate-800">${emp.name}</h4>
                        <span class="text-xs font-semibold px-2 py-0.5 bg-slate-100 text-slate-500 rounded-full">${rule.name}</span>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-slate-400 uppercase">应发总额</p>
                        <p class="text-2xl font-black text-indigo-600">${finalPay.toLocaleString()}</p>
                    </div>
                </div>

                <div class="space-y-2 text-sm border-t border-slate-50 pt-4">
                    <div class="flex justify-between">
                        <span class="text-slate-500">月度总业绩:</span>
                        <span class="font-semibold text-slate-700">${perfTotal.toLocaleString()}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-500">月薪资小计 (Wage):</span>
                        <span class="font-semibold text-slate-700">${basicWage.toLocaleString()}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-500">个人小费 (Tips):</span>
                        <span class="font-semibold text-green-600">+ ${emp.tips.toLocaleString()}</span>
                    </div>
                </div>

                <div class="mt-4 p-3 bg-amber-50 rounded-xl border border-amber-100">
                    <p class="text-[10px] text-amber-600 font-bold uppercase mb-1">公式注释 (Formula)</p>
                    <p class="text-xs text-amber-800 font-mono italic">
                        ${rule.base} + (${emp.current} + ${emp.last}) × ${rule.rate}%
                    </p>
                    <p class="text-[11px] text-amber-700/70 mt-1">
                        最终结算 = ${basicWage.toFixed(1)} (工资) + ${emp.tips} (小费)
                    </p>
                </div>
            `;
            container.appendChild(card);
        });

        // 滚动到结果区
        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>

</body>
</html>
